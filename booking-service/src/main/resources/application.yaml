server:
  port: 8082
  servlet:
    context-path: /booking-service

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:h2:mem:bookingdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

inventory:
  service:
    url: http://localhost:8080/inventory-service
